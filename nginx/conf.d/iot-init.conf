# Temporary HTTP-only config used BEFORE SSL certs are issued.
# After running certbot, switch to iot.conf and remove this file.
server {
    listen 80;
    server_name iot.dan1718.dev;

    location /.well-known/acme-challenge/ {
        alias /var/www/certbot/.well-known/acme-challenge/;
        try_files $uri =404;
    }

    location / {
        proxy_pass http://grafana:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
    }

    location /console/ {
        proxy_pass http://worker-console:80/;
        proxy_set_header Host $host;
    }

    location /panel/ {
        proxy_pass http://mockpanel:80/;
        proxy_set_header Host $host;
    }

    location /mqtt {
        proxy_pass http://mosquitto:9001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }
}
